# =============================================
# APPLICATION CONFIG — freelance-dz
# =============================================

spring.application.name=freelance-dz-backend
server.port=${PORT:8080}

# --- Database (Railway PostgreSQL) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/freelancedz}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:aze}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Cache (in-memory, no Redis needed) ---
spring.cache.type=simple

# --- JWT ---
app.jwt.secret=${JWT_SECRET:change-me-in-production-must-be-256-bits-long-secret-key}
app.jwt.access-expiration-ms=${JWT_ACCESS_EXP:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXP:604800000}

# --- Email ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:noreply@freelance-dz.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USER:noreply@freelance-dz.com}

# --- CORS ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://freelance-dz.vercel.app}

# --- App ---
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.otp.expiration-minutes=10

# --- Cloudinary ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# --- Logs ---
logging.level.dz.freelance=DEBUG
logging.level.org.springframework.security=INFO